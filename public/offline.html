<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Ikou</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    .kanji { font-size: 4rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p { font-size: 0.875rem; color: #9ca3af; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: #fff;
      color: #0a0a0f;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="kanji">行</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Cached lessons are still available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
